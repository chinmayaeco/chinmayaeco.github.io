<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monopoly Simulation</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo">🏦 <span>MONOPOLY</span></div>
        <div id="current-turn-display"></div>
      </div>
      <div class="header-right">
        <button id="btn-new-game" class="btn btn-secondary">New Game</button>
      </div>
    </header>
    <!-- Main Game Area -->
    <div id="main-content">
      <!-- Board -->
      <div id="board-wrapper">
        <div id="board">
          <!-- Bottom row (squares 0-10) -->
          <div id="bottom-row" class="board-row row-bottom"></div>
          <!-- Left col (squares 11-19) -->
          <div id="left-col" class="board-col col-left"></div>
          <!-- Center -->
          <div id="board-center">
            <div id="center-content">
              <div class="monopoly-title">MONOPOLY</div>
              <div id="dice-area">
                <div class="dice" id="die1">🎲</div>
                <div class="dice" id="die2">🎲</div>
              </div>
              <div id="roll-info"></div>
              <button id="btn-roll" class="btn btn-primary">Roll Dice</button>
              <button id="btn-end-turn" class="btn btn-secondary" style="display:none">End Turn</button>
              <button id="btn-buy" class="btn btn-buy" style="display:none">Buy Property</button>
              <button id="btn-pay-bail" class="btn btn-warning" style="display:none">Pay Bail ($50)</button>
            </div>
          </div>
          <!-- Right col (squares 21-29) -->
          <div id="right-col" class="board-col col-right"></div>
          <!-- Top row (squares 30-40) -->
          <div id="top-row" class="board-row row-top"></div>
        </div>
      </div>
      <!-- Sidebar -->
      <div id="sidebar">
        <!-- Players Panel -->
        <div class="panel" id="players-panel">
          <h2 class="panel-title">Players</h2>
          <div id="players-list"></div>
        </div>
        <!-- Action Log -->
        <div class="panel" id="log-panel">
          <h2 class="panel-title">Game Log</h2>
          <div id="game-log"></div>
        </div>
      </div>
    </div>
    <!-- Property Modal -->
    <div id="property-modal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="modal-close">✕</button>
        <div id="modal-body"></div>
      </div>
    </div>
    <!-- Setup Screen -->
    <div id="setup-screen" class="overlay">
      <div class="setup-card">
        <div class="setup-logo">🏦 MONOPOLY</div>
        <h1>Welcome to Monopoly</h1>
        <p class="setup-subtitle">Classic board game simulation</p>
        <div class="setup-form">
          <label>Number of Players (2–4)</label>
          <div class="player-count-selector">
            <button class="count-btn active" data-count="2">2</button>
            <button class="count-btn" data-count="3">3</button>
            <button class="count-btn" data-count="4">4</button>
          </div>
          <div id="player-names-inputs"></div>
          <div class="ai-options">
            <label>AI Players: <span id="ai-count-label">0</span></label>
            <input type="range" id="ai-count" min="0" max="3" value="0" />
          </div>
          <button id="btn-start" class="btn btn-primary btn-large">Start Game</button>
        </div>
      </div>
    </div>
    <!-- Win Screen -->
    <div id="win-screen" class="overlay hidden">
      <div class="win-card">
        <div class="win-emoji" id="win-emoji"></div>
        <h1 id="win-title"></h1>
        <p id="win-subtitle"></p>
        <button id="btn-play-again" class="btn btn-primary btn-large">Play Again</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
